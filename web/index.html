<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="八字排盘">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="bazi_app">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>
  <title>八字排盘</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body {
      margin: 0;
      height: 100%;
      background: #f7f3ec;
      font-family: "Microsoft YaHei", "PingFang SC", "SimHei", sans-serif;
    }
    #boot-splash {
      position: fixed;
      inset: 0;
      z-index: 99999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #f7f3ec;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      color: #4a4a45;
      transition: opacity 0.2s ease;
    }
    #boot-splash.boot-splash--gone {
      opacity: 0;
      pointer-events: none;
    }
    #boot-splash .title { font-size: 28px; letter-spacing: 8px; margin-bottom: 8px; }
    #boot-splash .hint { font-size: 14px; color: #8c867d; }
    #boot-splash .stuck {
      display: none;
      margin-top: 20px;
      max-width: 360px;
      font-size: 13px;
      line-height: 1.6;
      color: #b3261e;
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="boot-splash">
    <div class="title">八 字</div>
    <div class="hint">正在加载，请稍候…</div>
    <div class="stuck" id="boot-stuck">
      加载过久？请<strong>停止调试</strong>后，在终端执行
      <code>cd bazi</code> 再 <code>.\scripts\run_web.ps1</code> 重新启动。
      不要用热重载（⚡），需完整重启。
    </div>
  </div>
  <script>
    setTimeout(function () {
      var stuck = document.getElementById('boot-stuck');
      if (stuck) stuck.style.display = 'block';
    }, 12000);
    function hideBootSplash() {
      var el = document.getElementById('boot-splash');
      if (!el || el.dataset.removed === '1') return;
      el.dataset.removed = '1';
      el.classList.add('boot-splash--gone');
      setTimeout(function () { el.remove(); }, 250);
    }
    window.addEventListener('flutter-first-frame', hideBootSplash);
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
