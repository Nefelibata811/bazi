name: bazi_app
description: A minimalist Chinese-style BaZi charting app built with Flutter.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.20.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  cupertino_icons: ^1.0.8
  lunar: ^1.7.8
  supabase_flutter: ^2.8.4
  sqflite: ^2.4.1
  path_provider: ^2.1.5
  path: ^1.9.0
  crypto: ^3.0.6
  shared_preferences: ^2.3.3
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
